<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../src/styles/index.css">
  <title>Cocos Inspector</title>
</head>
<body>
  <div class="header">
    <div style="font-weight: bold; color: var(--accent-color); font-size: 14px;">COCOS</div>
    <input type="text" id="search-input" class="search-input" placeholder="Search nodes by name...">
    <button id="refresh-btn" style="background:none; border:none; cursor:pointer; color:var(--text-secondary);">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 2v6h-6M3 12a9 9 0 0 1 15-6.7L21 8M3 22v-6h6M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>
    </button>
  </div>

  <div class="main-container">
    <div id="tree-container" class="tree-container">
      <div class="empty-state">
        <p>Connecting to Cocos...</p>
      </div>
    </div>
    
    <div id="property-container" class="property-container">
      <div class="empty-state">
        <p>Select a node to view properties</p>
      </div>
    </div>
  </div>

  <div id="context-menu" class="context-menu">
    <div class="context-menu-item" data-action="copy-name">Copy Name</div>
    <div class="context-menu-item" data-action="copy-path">Copy Path</div>
    <div class="context-menu-item" data-action="log-console">Log to Console</div>
  </div>

  <script type="module" src="panel.js"></script>
</body>
</html>
